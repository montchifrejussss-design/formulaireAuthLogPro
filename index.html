<!DOCTYPE html>
<html lang="fr">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Connexion / Inscription - Fré_Dév-Web Tech Lab</title>
      <link rel="stylesheet" href="style.css">
</head>
<body>
      <main class="auth-wrapper">
            <div class="logo-container">
                  <img id="logo-img" src="/developer_logo.png" alt="Logo Fré_Dév-Web Tech Lab">
                  <h1 class="welcome-text">Content de vous revoir sur "<span>Fré_Dév-Web Tech Lab</span>"</h1>
            </div>
            <div class="auth-container">
                  <div class="forms-slider">
                        <form id="login-form" class="auth-form" autocomplete="on" novalidate>
                              <h2 class="form-title">Connexion</h2>
                              <div class="input-group">
                                    <input type="email" id="login-email" placeholder=" " required autocomplete="email">
                                    <label for="login-email">Adresse Email</label>
                              </div>
                              <div class="input-group">
                                    <input type="password" id="login-password" placeholder=" " required autocomplete="current-password">
                                    <label for="login-password">Mot de passe</label>
                                    <button type="button" class="password-toggle" aria-label="Afficher le mot de passe" tabIndex="-1">👁️</button>
                              </div>
                              <button type="submit" class="btn-submit" id="btn-login">Se connecter</button>
                              <p class="switch-text">
                                    Nouveau parmi nous ? 
                                    <button type="button" class="toggle-link" id="to-register">Créer un compte</button>
                              </p>
                        </form>
                        <form id="register-form" class="auth-form" autocomplete="off" novalidate>
                              <h2 class="form-title">Inscription</h2> 
                              <div class="input-group">
                                    <input type="text" id="reg-name" placeholder=" " required autocomplete="name">
                                    <label for="reg-name">Nom complet</label>
                              </div> 
                              <div class="input-group">
                                    <input type="email" id="reg-email" placeholder=" " required autocomplete="email">
                                    <label for="reg-email">Adresse Email</label>
                              </div>
                              <div class="input-group">
                                    <input type="password" id="reg-password" placeholder=" " required autocomplete="new-password">
                                    <label for="reg-password">Mot de passe</label>
                                    <button type="button" class="password-toggle" aria-label="Afficher le mot de passe" tabIndex="-1">👁️</button>
                              </div>
                              <div class="input-group">
                                    <input type="password" id="reg-confirm" placeholder=" " required autocomplete="new-password">
                                    <label for="reg-confirm">Confirmation du mot de passe</label>
                                    <button type="button" class="password-toggle" aria-label="Afficher le mot de passe" tabIndex="-1">👁️</button>
                              </div>
                              <button type="submit" class="btn-submit" id="btn-register">S'inscrire</button>
                              <p class="switch-text">
                                    Déjà inscrit ? 
                                    <button type="button" class="toggle-link" id="to-login">Se connecter</button>
                              </p>
                        </form>
                  </div>
            </div>
      </main>
      <script src="script.js" defer></script>
</body>
</html>
